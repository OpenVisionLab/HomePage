    <style>

        header {

            height: 160px;

            margin-top: 25px;
            padding: 12px 20px;
            background-color: #031233;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        a:hover {
            background-color: #222d50;
        }

        @media (max-width: 768px) {
            .profile-card {
